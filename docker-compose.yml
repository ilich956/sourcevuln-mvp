version: "3.9"
services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  migrate:
    image: migrate/migrate
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command:
      - -source
      - file:///migrations
      - -database
      - ${DATABASE_URL}
      - up
    volumes:
      - ./migrations:/migrations
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file: .env
    networks:
      - internal
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
